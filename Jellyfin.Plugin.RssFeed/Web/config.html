<div data-role="page" class="type-interior pluginConfigurationPage rssConfigurationPage">
    <div data-role="content">
        <div class="content-primary">
            <div class="verticalSection">
                <div class="sectionTitleContainer">
                    <h2 class="sectionTitle">RSS Feed Syndicator</h2>
                    <p>Select which libraries appear in the RSS feed. Each library also gets its own filtered URL.</p>
                </div>

                <div id="libraryList" class="checkboxList" style="margin-bottom:1em;"></div>

                <div class="inputContainer">
                    <label class="inputLabel" for="txtToken">Security Token</label>
                    <input is="emby-input" type="text" id="txtToken" style="width:100%;" />
                    <div class="fieldDescription">Auto-generated. Keep it secret — it is the only thing protecting your feed URL.</div>
                </div>

                <div class="inputContainer" style="margin-top:1.5em;">
                    <h3 style="margin-bottom:0.5em;">Feed URLs</h3>
                    <p style="margin-bottom:0.25em;">All enabled libraries:</p>
                    <div id="feedUrlAll" style="background:#222;padding:10px;word-break:break-all;color:#ddd;border-radius:4px;">(Save to generate)</div>
                    <div id="feedUrlPerLibrary" style="margin-top:1em;"></div>
                </div>

                <br/>
                <button is="emby-button" type="button" id="btnSave" class="raised button-submit block">
                    <span>Save</span>
                </button>

                <div id="saveStatus" style="margin-top:1em;color:#4CAF50;display:none;">Settings saved.</div>
            </div>
        </div>
    </div>

    <script type="text/javascript">
        (function () {
            var PLUGIN_ID = 'b6a52192-83d3-4938-afbd-f20ce331e1a1';

            function buildBaseUrl(token) {
                return window.location.protocol + '//' + window.location.host + '/RSS/Feed.xml?token=' + encodeURIComponent(token);
            }

            function renderPerLibraryUrls(virtualFolders, enabledIds, token) {
                var container = document.getElementById('feedUrlPerLibrary');
                var html = '';
                virtualFolders.forEach(function (folder) {
                    if (enabledIds && enabledIds.indexOf(folder.ItemId) !== -1) {
                        var url = buildBaseUrl(token) + '&libraryId=' + folder.ItemId;
                        html += '<p style="margin:0.8em 0 0.2em;font-weight:bold;">' + folder.Name + ':</p>'
                            + '<div style="background:#222;padding:10px;word-break:break-all;color:#ddd;border-radius:4px;">' + url + '</div>';
                    }
                });
                container.innerHTML = html;
            }

            function loadPage() {
                Promise.all([
                    ApiClient.getVirtualFolders(),
                    ApiClient.getPluginConfiguration(PLUGIN_ID)
                ]).then(function (results) {
                    var virtualFolders = results[0];
                    var config = results[1];

                    var listEl = document.getElementById('libraryList');
                    var html = '';
                    virtualFolders.forEach(function (folder) {
                        var checked = config.EnabledLibraryIds && config.EnabledLibraryIds.indexOf(folder.ItemId) !== -1 ? 'checked' : '';
                        html += '<div style="margin:0.4em 0;">'
                            + '<label style="display:flex;align-items:center;gap:0.5em;cursor:pointer;">'
                            + '<input type="checkbox" class="libraryCheckbox" data-id="' + folder.ItemId + '" ' + checked + ' />'
                            + '<span>' + folder.Name + '</span>'
                            + '</label>'
                            + '</div>';
                    });
                    listEl.innerHTML = html;

                    document.getElementById('txtToken').value = config.SecurityToken || '';
                    document.getElementById('feedUrlAll').textContent = buildBaseUrl(config.SecurityToken);
                    renderPerLibraryUrls(virtualFolders, config.EnabledLibraryIds, config.SecurityToken);
                }).catch(function (err) {
                    console.error('RSS plugin: failed to load config', err);
                });
            }

            function savePage() {
                ApiClient.getPluginConfiguration(PLUGIN_ID).then(function (config) {
                    config.SecurityToken = document.getElementById('txtToken').value;

                    var selectedIds = [];
                    document.querySelectorAll('.libraryCheckbox:checked').forEach(function (el) {
                        selectedIds.push(el.getAttribute('data-id'));
                    });
                    config.EnabledLibraryIds = selectedIds;

                    ApiClient.updatePluginConfiguration(PLUGIN_ID, config).then(function () {
                        document.getElementById('feedUrlAll').textContent = buildBaseUrl(config.SecurityToken);

                        ApiClient.getVirtualFolders().then(function (virtualFolders) {
                            renderPerLibraryUrls(virtualFolders, config.EnabledLibraryIds, config.SecurityToken);
                        });

                        var status = document.getElementById('saveStatus');
                        status.style.display = 'block';
                        setTimeout(function () { status.style.display = 'none'; }, 3000);
                    }).catch(function (err) {
                        console.error('RSS plugin: failed to save config', err);
                    });
                });
            }

            document.addEventListener('viewshow', function (e) {
                if (e.target && e.target.classList && e.target.classList.contains('rssConfigurationPage')) {
                    loadPage();
                }
            });

            document.addEventListener('DOMContentLoaded', function () {
                var btn = document.getElementById('btnSave');
                if (btn) {
                    btn.addEventListener('click', savePage);
                }
            });

            // Fallback — if DOMContentLoaded already fired (Jellyfin injects pages dynamically)
            var btn = document.getElementById('btnSave');
            if (btn) {
                btn.addEventListener('click', savePage);
            }

            loadPage();
        })();
    </script>
</div>
