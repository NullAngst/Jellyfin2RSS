<div data-role="page" class="type-interior pluginConfigurationPage rssConfigurationPage">
    <div data-role="content">
        <div class="content-primary">
            <style>
                .rssConfigurationPage label {
                    display: flex;
                    align-items: center;
                    gap: 0.6em;
                    padding: 0.3em 0;
                    cursor: pointer;
                }
                .rssConfigurationPage input[type="checkbox"] {
                    width: 18px;
                    height: 18px;
                    cursor: pointer;
                    flex-shrink: 0;
                }
                .rssConfigurationPage .rss-url-box {
                    background: #222;
                    padding: 10px;
                    word-break: break-all;
                    color: #ddd;
                    border-radius: 4px;
                    margin-top: 0.25em;
                }
                .rssConfigurationPage #rssTokenInput {
                    width: 100%;
                    max-width: 600px;
                    padding: 0.5em;
                    font-size: 1em;
                    background: #333;
                    color: #fff;
                    border: 1px solid #555;
                    border-radius: 4px;
                    box-sizing: border-box;
                }
                .rssConfigurationPage #rssSaveBtn {
                    margin-top: 1.5em;
                    padding: 0.6em 2em;
                    font-size: 1em;
                    background: #00a4dc;
                    color: #fff;
                    border: none;
                    border-radius: 4px;
                    cursor: pointer;
                }
                .rssConfigurationPage #rssSaveBtn:hover {
                    background: #0090c0;
                }
                .rssConfigurationPage #rssSaveStatus {
                    margin-top: 0.75em;
                    color: #4CAF50;
                    display: none;
                }
            </style>

            <div class="verticalSection">
                <div class="sectionTitleContainer">
                    <h2 class="sectionTitle">RSS Feed Syndicator</h2>
                    <p>Select which libraries appear in the RSS feed. Each library also gets its own filtered URL.</p>
                </div>

                <div id="rssLibraryList" style="margin-bottom: 1em;"></div>

                <div class="inputContainer">
                    <label class="inputLabel" for="rssTokenInput" style="display:block;margin-bottom:0.4em;">Security Token</label>
                    <input type="text" id="rssTokenInput" />
                    <div class="fieldDescription">Auto-generated. Keep it secret — it is the only thing protecting your feed URL.</div>
                </div>

                <div class="inputContainer" style="margin-top: 1.5em;">
                    <h3>Feed URLs</h3>
                    <p style="margin-bottom: 0.25em;">All enabled libraries:</p>
                    <div class="rss-url-box" id="rssFeedUrlAll">(Save to generate)</div>
                    <div id="rssFeedUrlPerLibrary" style="margin-top: 1em;"></div>
                </div>

                <button type="button" id="rssSaveBtn">Save</button>
                <div id="rssSaveStatus">Settings saved.</div>
            </div>
        </div>
    </div>

    <script type="text/javascript">
        (function () {
            var PLUGIN_ID = 'b6a52192-83d3-4938-afbd-f20ce331e1a1';
            var _folders = [];
            var _styleEl = null;

            // Inject into <head> via CSSOM — survives React re-renders because React
            // only manages its own virtual DOM, not arbitrary stylesheet nodes.
            function injectHeadStyle() {
                if (_styleEl) return;
                _styleEl = document.createElement('style');
                _styleEl.id = 'rss-plugin-overlay-fix';
                _styleEl.textContent = '.backgroundContainer { pointer-events: none !important; }';
                document.head.appendChild(_styleEl);
            }

            function removeHeadStyle() {
                if (_styleEl && _styleEl.parentNode) {
                    _styleEl.parentNode.removeChild(_styleEl);
                    _styleEl = null;
                }
            }

            function baseUrl(token) {
                return window.location.protocol + '//' + window.location.host
                    + '/RSS/Feed.xml?token=' + encodeURIComponent(token);
            }

            function renderPerLibrary(enabledIds, token) {
                var html = '';
                _folders.forEach(function (f) {
                    if (enabledIds.indexOf(f.ItemId) !== -1) {
                        var url = baseUrl(token) + '&libraryId=' + f.ItemId;
                        html += '<p style="margin:0.8em 0 0.2em;font-weight:bold;">' + f.Name + ':</p>'
                            + '<div class="rss-url-box">' + url + '</div>';
                    }
                });
                document.getElementById('rssFeedUrlPerLibrary').innerHTML = html;
            }

            function load() {
                injectHeadStyle();
                Dashboard.showLoadingMsg();
                Promise.all([
                    ApiClient.getVirtualFolders(),
                    ApiClient.getPluginConfiguration(PLUGIN_ID)
                ]).then(function (res) {
                    _folders = res[0];
                    var config = res[1];
                    var enabledIds = config.EnabledLibraryIds || [];

                    var html = '';
                    _folders.forEach(function (f) {
                        var chk = enabledIds.indexOf(f.ItemId) !== -1 ? 'checked' : '';
                        html += '<label>'
                            + '<input type="checkbox" class="rssLibChk" data-id="' + f.ItemId + '" ' + chk + ' />'
                            + '<span>' + f.Name + '</span>'
                            + '</label>';
                    });
                    document.getElementById('rssLibraryList').innerHTML = html;
                    document.getElementById('rssTokenInput').value = config.SecurityToken || '';
                    document.getElementById('rssFeedUrlAll').textContent = baseUrl(config.SecurityToken);
                    renderPerLibrary(enabledIds, config.SecurityToken);
                }).catch(function (err) {
                    console.error('RSS plugin load error:', err);
                }).finally(function () {
                    Dashboard.hideLoadingMsg();
                });
            }

            function save() {
                Dashboard.showLoadingMsg();
                ApiClient.getPluginConfiguration(PLUGIN_ID).then(function (config) {
                    config.SecurityToken = document.getElementById('rssTokenInput').value;
                    config.EnabledLibraryIds = Array.from(
                        document.querySelectorAll('.rssLibChk:checked')
                    ).map(function (el) { return el.getAttribute('data-id'); });

                    ApiClient.updatePluginConfiguration(PLUGIN_ID, config).then(function () {
                        document.getElementById('rssFeedUrlAll').textContent = baseUrl(config.SecurityToken);
                        renderPerLibrary(config.EnabledLibraryIds, config.SecurityToken);
                        var s = document.getElementById('rssSaveStatus');
                        s.style.display = 'block';
                        setTimeout(function () { s.style.display = 'none'; }, 3000);
                    }).catch(function (err) {
                        console.error('RSS plugin save error:', err);
                    }).finally(function () {
                        Dashboard.hideLoadingMsg();
                    });
                });
            }

            // Clean up the injected style if the user navigates away
            document.addEventListener('viewhide', function onHide(e) {
                if (e.target && e.target.classList && e.target.classList.contains('rssConfigurationPage')) {
                    removeHeadStyle();
                    document.removeEventListener('viewhide', onHide);
                }
            });

            document.getElementById('rssSaveBtn').addEventListener('click', save);
            load();
        })();
    </script>
</div>
